databaseChangeLog:
  - changeSet:
    id: create-client
    author: alwaysintilte
    changes:
      - createTable:
        tableName: client
        columns:
          - column:
            name: id
            type: bigint
            autoIncrement: true
            constraints:
              primaryKey: true
              nullable: false
          - column:
            name: first_name
            type: varchar(100)
            constraints:
              nullable: false
          - column:
            name: last_name
            type: varchar(100)
            constraints:
              nullable: false
          - column:
            name: phone
            type: varchar(20)
            constraints:
              unique: true
              nullable: false
          - column:
            name: email
            type: varchar(100)
            constraints:
              unique: true
          - column:
            name: password
            type: varchar(256)
            constraints:
              nullable: false