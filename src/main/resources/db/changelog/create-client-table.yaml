databaseChangeLog:
  - changeSet:
    id: create-client
    author: alwaysintilte
    changes:
      - createTable:
        tableName: clients
        columns:
          - column:
            name: id
            type: bigint
            constraints:
              primaryKey: true
              nullable: false
              foreignKeyName: fk_client_user
              references: users(id)
              onDelete: CASCADE