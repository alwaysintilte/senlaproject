databaseChangeLog:
  - changeSet:
      id: create-service
      author: alwaysintilte
      changes:
        - createTable:
            tableName: services
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: duration
                  type: int
              - column:
                  name: price
                  type: decimal(6, 2)
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: varchar(100)
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false