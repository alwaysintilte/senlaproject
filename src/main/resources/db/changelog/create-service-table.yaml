databaseChangeLog:
  - changeSet:
    id: create-service
    author: alwaysintilte
    changes:
      - createTable:
        tableName: service
        columns:
          - column:
            name: id
            type: bigint
            autoIncrement: true
            constraints:
              primaryKey: true
              nullable: false
          - column:
            name: name
            type: varchar(100)
            constraints:
              nullable: false
          - column:
            name: description
            type: text
          - column:
            name: duration
            type: int
          - column:
            name: price
            type: decimal(6, 2)
            constraints:
              nullable: false
          - column:
            name: category
            type: varchar(100)