databaseChangeLog:
  - changeSet:
      id: trigger-recount-barber-rating
      author: alwaysintilte
      changes:
        - sql:
            dbms: postgresql
            splitStatements: false
            sql: |
              CREATE OR REPLACE FUNCTION recount_barber_rating()
                  RETURNS TRIGGER
                  LANGUAGE plpgsql
              AS 
              $$
              BEGIN
                  IF TG_OP = 'DELETE' THEN
                      UPDATE barbers
                      SET rating = (
                        SELECT COALESCE(AVG(review.rating), 0.0)
                        FROM reviews review
                        JOIN appointments appointment ON review.appointment_id = appointment.id
                        WHERE appointment.barber_id = (SELECT barber_id FROM appointments WHERE id = OLD.appointment_id)
                      )
                      WHERE id = (SELECT barber_id FROM appointments WHERE id = OLD.appointment_id);
                  ELSE
                      UPDATE barbers
                      SET rating = (
                          SELECT COALESCE(AVG(review.rating), 0.0) 
                          FROM reviews review
                          JOIN appointments appointment ON review.appointment_id = appointment.id
                          WHERE appointment.barber_id = (SELECT barber_id FROM appointments WHERE id = NEW.appointment_id)
                      )
                      WHERE id = (SELECT barber_id FROM appointments WHERE id = NEW.appointment_id);
                  END IF;
                  RETURN NULL;
              END;
              $$;
              
              CREATE TRIGGER trigger_recount_barber_rating
              AFTER INSERT OR UPDATE OR DELETE ON reviews
              FOR EACH ROW
              EXECUTE FUNCTION recount_barber_rating();